name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dataeng
          POSTGRES_PASSWORD: dataeng123
          POSTGRES_DB: financial_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run database migrations
      env:
        PGPASSWORD: dataeng123
      run: |
        psql -h localhost -U dataeng -d financial_data -f migrations/001_initial_schema.sql
        psql -h localhost -U dataeng -d financial_data -f migrations/002_create_views.sql

    - name: Run tests with coverage
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: financial_data
        DB_USER: dataeng
        DB_PASSWORD: dataeng123
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        ALPHA_VANTAGE_API_KEY: dummy_key_for_tests
        STOCK_SYMBOLS: AAPL,GOOGL
        CRYPTO_SYMBOLS: bitcoin,ethereum
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install linting tools
      run: |
        pip install flake8 black

    - name: Run flake8
      continue-on-error: true
      run: |
        flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503

    - name: Check formatting with black
      run: |
        black --check src/ tests/ --line-length=100
